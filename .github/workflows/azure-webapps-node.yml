            color: #ffffff;
            padding: 50px 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        main {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
        }

        .card {
            background-color: #ffffff;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: right;
        }

        .card h2 {
            margin-top: 0;
            color: #007bff;
            border-bottom: 2px solid #f4f7f6;
            padding-bottom: 10px;
        }

        /* تنسيق بطاقة الجمل والهوية الجامعية المدمجة */
        .camel-profile-card {
            background: #ffffff;
            border: 2px solid #e0e0e0;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .camel-container {
            background: #f8f9fa;
            border-radius: 50%;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #007bff;
        }

        .digital-camel {
            width: 90px;
            height: 90px;
            animation: camelWalk 4s infinite ease-in-out;
        }

        .student-name {
            color: #222222;
            margin: 10px 0 5px 0;
            font-size: 1.7em;
            font-weight: 700;
        }

        .university-tag {
            color: #007bff;
            margin: 0 0 15px 0;
            font-weight: 600;
            font-size: 1.2em;
        }

        .specialty-badge {
            background: #e3f2fd;
